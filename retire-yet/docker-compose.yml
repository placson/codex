services:
  postgres:
    image: postgres:16-alpine
    container_name: retire-yet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: retire_yet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - retire_yet_postgres_data:/var/lib/postgresql/data

volumes:
  retire_yet_postgres_data:
